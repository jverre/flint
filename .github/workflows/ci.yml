name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-r2nfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Resolve dependencies
        working-directory: services/r2nfs
        run: go get ./... && go mod tidy
      - name: Build
        working-directory: services/r2nfs
        run: go build -o r2nfs .
      - name: Test
        working-directory: services/r2nfs
        run: go test -v -race -count=1 ./...

  go-flintd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: guest/flintd/go.sum
      - name: Download dependencies
        working-directory: guest/flintd
        run: go mod tidy
      - name: Build
        working-directory: guest/flintd
        run: go build -o flintd .

  e2e:
    runs-on: ubuntu-latest
    needs: [go-r2nfs, go-flintd]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install Python dependencies
        run: uv sync --dev
      - name: Build r2nfs
        working-directory: services/r2nfs
        run: go get ./... && go mod tidy && go build -o r2nfs .
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Install Firecracker + kernel
        run: sudo bash scripts/install-deps.sh
      - name: Install crane
        run: |
          curl -fsSL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin crane
      - name: Build base image and extract rootfs
        # Build the base image from source rather than pulling from ghcr.io —
        # that way PR runs are self-contained and don't depend on publish-image.yml
        # (which only runs on push to main) having populated the registry.
        run: |
          sudo mkdir -p /root/firecracker-vm
          truncate -s 200M /root/firecracker-vm/rootfs.ext4
          mkfs.ext4 -q /root/firecracker-vm/rootfs.ext4
          MOUNT_DIR="/tmp/flint-rootfs-ci"
          mkdir -p "$MOUNT_DIR"
          docker build -f images/base/Dockerfile -t flint-base:ci .
          CID=$(docker create flint-base:ci)
          sudo mount /root/firecracker-vm/rootfs.ext4 "$MOUNT_DIR"
          docker export "$CID" | sudo tar -x -C "$MOUNT_DIR"
          sudo umount "$MOUNT_DIR"
          docker rm "$CID"
      - name: Prepare runtime directories
        run: sudo mkdir -p /srv/jailer
      - name: Run tests
        run: sudo -E env "PATH=$PATH" uv run python -m pytest tests/ -v -m "not slow"
        timeout-minutes: 10
