name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-r2nfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Resolve dependencies
        working-directory: services/r2nfs
        run: go get ./... && go mod tidy
      - name: Build
        working-directory: services/r2nfs
        run: go build -o r2nfs .
      - name: Test
        working-directory: services/r2nfs
        run: go test -v -race -count=1 ./...

  go-flintd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: guest/flintd/go.sum
      - name: Download dependencies
        working-directory: guest/flintd
        run: go mod tidy
      - name: Build
        working-directory: guest/flintd
        run: go build -o flintd .

  e2e:
    runs-on: ubuntu-latest
    needs: [go-r2nfs, go-flintd]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install dependencies
        run: uv sync --dev
      - name: Build r2nfs
        working-directory: services/r2nfs
        run: go get ./... && go mod tidy && go build -o r2nfs .
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run tests
        run: uv run python -m pytest tests/ -v -m "not slow"
        timeout-minutes: 10
