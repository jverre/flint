name: Build Agent Images

# Build and push pre-packaged agent Docker images to GHCR.
# Runs on pushes to main that touch agent Dockerfiles, and weekly
# to pick up upstream changes in agent repos.

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
  schedule:
    # Daily rebuild (06:00 UTC) to pull upstream updates
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent to build (leave empty for all)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.set-matrix.outputs.agents }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          if [ -n "${{ inputs.agent }}" ]; then
            echo "agents=[\"${{ inputs.agent }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Discover all agents with Dockerfiles
            agents=$(ls -d agents/*/Dockerfile 2>/dev/null | xargs -I{} dirname {} | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "agents=$agents" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.build-matrix.outputs.agents) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.agent }}
        uses: docker/build-push-action@v6
        with:
          context: agents/${{ matrix.agent }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/agent-${{ matrix.agent }}:latest
            ${{ env.IMAGE_PREFIX }}/agent-${{ matrix.agent }}:${{ github.sha }}
          cache-from: type=gha,scope=agent-${{ matrix.agent }}
          cache-to: type=gha,mode=max,scope=agent-${{ matrix.agent }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Pre-built Flint agent image for ${{ matrix.agent }}
